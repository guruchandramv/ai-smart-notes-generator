<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DASHBOARD — AI SMART NOTES</title>
  <link rel="icon" href="images/notes.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- ── App Shell ── -->
<div class="app-shell">

  <!-- Top Bar -->
  <header class="topbar">
    <div class="topbar-brand">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
      </svg>
      <span>AI SMART NOTES</span>
    </div>

    <div class="topbar-right">
      <div class="user-pill" tabindex="0">
        <div class="avatar" id="avatar-initials">?</div>
        <span class="user-name" id="nav-username">User</span>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="color:var(--text-muted)">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
        <div class="dropdown-menu">
          <a href="account.html">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
            My Account
          </a>
          <div class="dropdown-divider"></div>
          <a href="#" onclick="logout()" class="danger">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            Sign Out
          </a>
        </div>
      </div>
    </div>
  </header>

  <!-- Main -->
  <div class="main-content">
    <div class="workspace">

      <!-- Input Cards -->
      <div class="input-grid">

        <!-- Upload Card -->
        <div class="input-card">
          <div class="card-title">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            Upload File
          </div>
          <div class="file-drop-zone" id="drop-zone">
            <input type="file" id="file-input" accept=".txt,.pdf,.doc,.docx" onchange="handleFileSelect()" />
            <div class="drop-icon">📂</div>
            <div class="drop-text"><strong>Click to browse</strong> or drag & drop</div>
            <div class="drop-text" style="margin-top:0.2rem;font-size:0.75rem">TXT, PDF, DOC supported</div>
          </div>
          <div class="file-selected" id="file-selected-label">
            <span>✅</span><span id="selected-filename">No file</span>
          </div>
          <button class="btn btn-primary" onclick="processFile()" style="margin-top:0.75rem">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
            Generate Notes
          </button>
        </div>

        <!-- Paste Text Card -->
        <div class="input-card">
          <div class="card-title">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            Paste Text
          </div>
          <textarea class="textarea-note" id="paste-text" placeholder="Paste any text — articles, lecture notes, meeting transcripts — and get a smart summary…"></textarea>
          <button class="btn btn-primary" onclick="processText()">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
            Generate Notes
          </button>
        </div>
      </div>

      <!-- Recent Notes -->
      <div class="section-header">
        <span class="section-title">Recent Notes</span>
        <span class="note-count" id="note-count">0 notes</span>
      </div>

      <div class="notes-list" id="notes-list">
        <div class="empty-state">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
            <polyline points="10 9 9 9 8 9"/>
          </svg>
          <p>No notes yet. Upload a file or paste text to get started.</p>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- ── View Note Modal ── -->
<div class="modal-overlay" id="view-modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modal-note-title">Note</span>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <pre id="modal-note-content"></pre>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Close</button>
      <button class="btn btn-primary" onclick="exportCurrentNote()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Export
      </button>
    </div>
  </div>
</div>

<script>
// ── State ──
let notes = JSON.parse(localStorage.getItem('smartnotes') || '[]');
let currentViewIndex = null;

// ── Guard: redirect if not logged in ──
const user = JSON.parse(localStorage.getItem('user'));
if (!user) window.location.href = 'login.html';

// ── Populate user info ──
const navUsername = document.getElementById('nav-username');
const avatarEl = document.getElementById('avatar-initials');
if (user) {
  navUsername.textContent = user.username || 'User';
  avatarEl.textContent = (user.username || 'U')[0].toUpperCase();
}

// ── Toast ──
function showToast(msg, type = 'info') {
  const t = document.createElement('div');
  t.className = `toast toast-${type}`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3200);
}

// ── File drop zone ──
const dropZone = document.getElementById('drop-zone');
dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', (e) => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file) {
    document.getElementById('file-input').files = e.dataTransfer.files;
    handleFileSelect();
  }
});

function handleFileSelect() {
  const file = document.getElementById('file-input').files[0];
  if (!file) return;
  document.getElementById('selected-filename').textContent = file.name;
  document.getElementById('file-selected-label').style.display = 'flex';
}

// ── Process file: read text content then call AI ──
function processFile() {
  const file = document.getElementById('file-input').files[0];
  if (!file) { showToast('Please select a file first.', 'error'); return; }

  const reader = new FileReader();
  reader.onload = (e) => {
    const text = e.target.result;
    if (!text.trim()) { showToast('File appears to be empty.', 'error'); return; }
    callAI(text, file.name);
  };
  reader.onerror = () => showToast('Could not read file.', 'error');
  reader.readAsText(file);
}

// ── Process pasted text ──
function processText() {
  const text = document.getElementById('paste-text').value.trim();
  if (!text) { showToast('Please paste some text first.', 'error'); return; }
  callAI(text, 'Pasted Text');
}

// ── Call Claude API ──
async function callAI(inputText, sourceName) {
  const btn = event?.target?.closest('button');
  const originalHTML = btn?.innerHTML;
  if (btn) {
    btn.disabled = true;
    btn.innerHTML = '<div class="spinner"></div> Generating…';
  }

  // Add skeleton loader
  const skeleton = document.createElement('div');
  skeleton.className = 'skeleton';
  skeleton.id = 'loading-skeleton';
  const list = document.getElementById('notes-list');
  const emptyState = list.querySelector('.empty-state');
  if (emptyState) emptyState.remove();
  list.prepend(skeleton);

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content: `Generate concise, well-structured smart notes from the following content. Format the output with:
- A brief 1-sentence summary at the top
- Key Points (bullet list, max 6 items)
- Important Terms (if any)
- Action Items (if any)

Keep it clear, scannable and under 300 words.

Content:
"""
${inputText.slice(0, 3000)}
"""`
        }]
      })
    });

    const data = await response.json();
    const noteText = data.content?.map(b => b.text || '').join('') || 'Could not generate notes.';

    saveNote(sourceName, noteText);
    showToast('Notes generated!', 'success');
    if (sourceName === 'Pasted Text') document.getElementById('paste-text').value = '';

  } catch (err) {
    showToast('Error connecting to AI. Check your connection.', 'error');
    console.error(err);
    renderNotes(); // re-render to remove skeleton
  } finally {
    document.getElementById('loading-skeleton')?.remove();
    if (btn) { btn.disabled = false; btn.innerHTML = originalHTML; }
  }
}

// ── Save note ──
function saveNote(source, content) {
  const note = {
    id: Date.now(),
    source,
    content,
    date: new Date().toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' })
  };
  notes.unshift(note);
  localStorage.setItem('smartnotes', JSON.stringify(notes));
  renderNotes();
}

// ── Render notes list ──
function renderNotes() {
  const list = document.getElementById('notes-list');
  const countEl = document.getElementById('note-count');
  countEl.textContent = `${notes.length} note${notes.length !== 1 ? 's' : ''}`;

  if (notes.length === 0) {
    list.innerHTML = `<div class="empty-state">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="16" y1="13" x2="8" y2="13"/>
        <line x1="16" y1="17" x2="8" y2="17"/>
        <polyline points="10 9 9 9 8 9"/>
      </svg>
      <p>No notes yet. Upload a file or paste text to get started.</p>
    </div>`;
    return;
  }

  list.innerHTML = notes.map((note, i) => {
    const ext = note.source.split('.').pop().toLowerCase();
    const emoji = ext === 'pdf' ? '📄' : ext === 'docx' || ext === 'doc' ? '📝' : '📋';
    return `<div class="note-item" id="note-${note.id}">
      <div class="note-icon">${emoji}</div>
      <div class="note-meta">
        <div class="note-name">${escapeHtml(note.source)}</div>
        <div class="note-date">${note.date}</div>
      </div>
      <div class="note-actions">
        <button class="btn btn-ghost" onclick="viewNote(${i})">View</button>
        <button class="btn btn-ghost" onclick="exportNote(${i})">Export</button>
        <button class="btn btn-danger" onclick="deleteNote(${i})">Delete</button>
      </div>
    </div>`;
  }).join('');
}

// ── View note ──
function viewNote(i) {
  currentViewIndex = i;
  document.getElementById('modal-note-title').textContent = notes[i].source;
  document.getElementById('modal-note-content').textContent = notes[i].content;
  document.getElementById('view-modal').classList.add('open');
}

function closeModal() {
  document.getElementById('view-modal').classList.remove('open');
  currentViewIndex = null;
}

// Close on backdrop click
document.getElementById('view-modal').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) closeModal();
});

// ── Export note ──
function exportNote(i) {
  const note = notes[i];
  const blob = new Blob([`Smart Notes — ${note.source}\nGenerated: ${note.date}\n\n${note.content}`], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `SmartNotes_${note.source.replace(/[^a-z0-9]/gi, '_')}.txt`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('Note exported!', 'success');
}

function exportCurrentNote() {
  if (currentViewIndex !== null) exportNote(currentViewIndex);
}

// ── Delete note ──
function deleteNote(i) {
  notes.splice(i, 1);
  localStorage.setItem('smartnotes', JSON.stringify(notes));
  renderNotes();
  showToast('Note deleted.', 'info');
}

// ── Logout ──
function logout() {
  localStorage.removeItem('loggedIn');
  window.location.href = 'login.html';
}

// ── Helpers ──
function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Init ──
renderNotes();
</script>
</body>
</html>
